name: Deploy to GitHub Pages

# 触发时机：当 main 分支（或者你当前的主分支，如果是 master 请改为 master）收到 push 时触发
on:
  push:
    branches:
      - master

# 赋予该工作流部署 Pages 的最高核心权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个部署任务在跑，防止多次 push 导致冲突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 物理对齐你本地的 Node 版本
          cache: 'npm'     # 开启 npm 依赖缓存，第二次跑 Actions 时速度飞快

      - name: Install Dependencies
        run: npm ci        # 严格根据 package-lock.json 安装依赖，比 npm install 更稳

      - name: Build Project
        run: npm run build # 执行你的打包编译命令（产出 dist 目录）

      - name: Upload Production Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'   # 将打包出来的 dist 目录打包上传为 Pages 资产

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
