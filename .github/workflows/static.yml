name: Deploy to GitHub Pages Automatically

on:
  push:
    branches:
      - master # 盯紧你的 master 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🌟 1. 核心注入：在 setup-node 之前，先让官方 pnpm 插件起床就位
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # 自动安装最新 v9 版本的 pnpm，可以根据你本地实际大版本改动（如 v8）

      # 🌟 2. 完美对齐：把原先的 cache: 'npm' 优雅地改成 cache: 'pnpm'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 自动帮你在云端缓存 pnpm 的全量依赖，下次打包只需几秒钟

      # 🌟 3. 降维打击：把原先的 npm 替换为 pnpm 工业级生产线
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./dist
          publish_branch: gh-pages
